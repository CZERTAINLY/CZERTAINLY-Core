name: Publish signing Docker image

# Builds and pushes a Docker image for the feat/signing branch.
# Produces two tags:
#   signing-latest          – mutable, always the most recent commit
#   signing-<short-sha>     – immutable, use this in K8s manifests/Helm values
#
# DEPENDENCY: com.czertainly:interfaces:2.17.0-signing-SNAPSHOT must already be published
# to GitHub Packages by the CZERTAINLY-Interfaces feat/signing workflow before
# this workflow runs.

on:
  push:
    branches:
      - feat/signing
  workflow_dispatch:

concurrency:
  group: publish-signing-docker-czertainly-core
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE: czertainly/czertainly-core
  DOCKERFILE: ./Dockerfile
  CACHE_SCOPE: czertainly-core-signing

jobs:
  build_and_push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # read interfaces SNAPSHOT from GitHub Packages

    steps:
      - uses: actions/checkout@v6

      # Generates ~/.m2/settings.xml with a <server id="github"> entry so Maven
      # can authenticate to GitHub Packages when resolving the interfaces SNAPSHOT.
      - name: Set up Java 21 with GitHub Packages auth
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Maven package
        run: mvn -f pom.xml -U -B -ntp -T 1C -DskipTests clean package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The Dockerfile expects artefacts under data/target/ and data/docker/
      # (mirrors the layout used by the multi-arch production workflow).
      - name: Prepare Docker build context
        run: |
          mkdir -p data/target
          cp -a target/*.jar data/target/
          cp -a docker data/docker

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_CZERTAINLY_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_CZERTAINLY_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=signing-latest
            type=sha,prefix=signing-,format=short

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build-and-push.outputs.digest }}
          format: json
          output: trivy-report.json
          exit-code: 0   # non-blocking on feature branches

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
